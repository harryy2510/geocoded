name: Seed KV

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/seed.ts'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Generate KV bulk files and upload
        run: bun seed:upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
